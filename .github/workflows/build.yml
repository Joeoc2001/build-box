name: Build & Push Images

on:
  push:
    branches: [main]
  schedule:
    # Run every Sunday at 2 AM UTC to catch dependency updates
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "APP_IMAGE=ghcr.io/${REPO}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push environment image
        run: |
          DOCKER_BUILD_USE_BUILDX=1 scripts/build-with-latest-versions.sh \
            --platform linux/amd64 \
            --push \
            --cache-from type=gha,scope=env \
            --cache-to type=gha,mode=max,scope=env \
            --tag "${APP_IMAGE}:latest" \
            --tag "${APP_IMAGE}:${GITHUB_SHA}"
